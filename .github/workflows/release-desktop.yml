name: Release Desktop Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller streamlit customtkinter yt-dlp assemblyai openai anthropic python-dotenv

      - name: Install Inno Setup (for installer exe)
        shell: powershell
        run: choco install innosetup -y

      - name: Build GuruNote.exe + GuruNote-Installer.exe
        shell: bash
        run: |
          python scripts/package_desktop.py --target windows --formats installer

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gurunote-windows
          path: |
            dist/GuruNote.exe
            dist/GuruNote-Installer.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS packages
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller streamlit customtkinter yt-dlp assemblyai openai anthropic python-dotenv

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build GuruNote.app + DMG + PKG
        run: |
          python scripts/package_desktop.py --target macos --formats dmg pkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gurunote-macos
          path: |
            dist/GuruNote.app
            dist/GuruNote.dmg
            dist/GuruNote.pkg
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show collected files
        run: find release-assets -type f -maxdepth 4 | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/gurunote-windows/GuruNote.exe
            release-assets/gurunote-windows/GuruNote-Installer.exe
            release-assets/gurunote-macos/GuruNote.dmg
            release-assets/gurunote-macos/GuruNote.pkg
