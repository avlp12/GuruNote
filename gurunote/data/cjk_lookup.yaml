# ─────────────────────────────────────────────────────────────
# 일본어 — Multi-char 표현
# ─────────────────────────────────────────────────────────────
japanese:
  # === 5/26 실측 패턴 (요약 섹션 leak — 한자어 한국 독음) ===
  "設計": "설계"        # 한자 (한국 設計)
  "評価": "평가"        # 일본자체 (한국 評價)
  "評価する": "평가하다"
  "設計する": "설계하다"
  # === 5/17 + 5/18 실측 패턴 (우선 등록) ===
  "取り組んでいる": "다루고 있다"
  "取り組み": "노력"
  "考えている": "생각하고 있다"
  "考える": "생각하다"
  "ためには": "위해서는"
  "場合": "경우"
  "仕組み": "구조"

  # === N4~N3 빈출 표현 ===
  "について": "에 대해"
  "によって": "에 의해"
  "として": "로서"
  "という": "라는"
  "ということ": "라는 것"
  "わけではない": "것은 아니다"
  "かもしれない": "일지도 모른다"
  "なければならない": "해야 한다"
  "ことができる": "할 수 있다"

  # === N4~N3 빈출 어휘 (한자 어휘) ===
  "問題": "문제"
  "課題": "과제"
  "解決": "해결"
  "開発": "개발"
  "研究": "연구"
  "技術": "기술"
  "情報": "정보"
  "結果": "결과"
  "目的": "목적"
  "方法": "방법"
  "経験": "경험"
  "能力": "능력"
  "機会": "기회"
  "関係": "관계"
  "影響": "영향"
  "変化": "변화"
  "状況": "상황"

  # === 동사 활용 빈출 (~ている / ~ていく / ~てくる 등) ===
  "進んでいる": "진행되고 있다"
  "増えている": "늘어나고 있다"
  "減っている": "줄어들고 있다"
  "なっている": "되고 있다"
  "やっている": "하고 있다"
  "見ている": "보고 있다"

# ─────────────────────────────────────────────────────────────
# 단일 문자 — 단독 잔재 시에만 적용
#
# 주의: 단일 한자는 한국어 한자어 일부일 가능성도 있으나, 본 후처리는
#       Sub-path A 에서 multi-char 매칭이 모두 실패한 뒤 마지막 단계로
#       사용되므로, 단독 잔재만 catch 한다.
#       명백히 중국어/일본어 전용 (한국어 vocab 부재) 문자만 등록.
# ─────────────────────────────────────────────────────────────
single_char:
  # === 중국어 전용 단일 한자 (한국어 부재 또는 매우 드문 사용) ===
  "这": "이"          # 지시대명사, 한국어 부재
  "那": "그"          # 지시대명사, 한국어 부재
  "是": ""            # 계사, 한국어 표현 부재 (삭제 가능)
  "的": ""            # 소유격, 한국어 표현 부재 (삭제 가능)
  "了": ""            # 완료상, 한국어 표현 부재
  "着": ""            # 진행상, 한국어 표현 부재
  "过": ""            # 경험상, 한국어 표현 부재
  "吧": ""            # 어기조사, 한국어 표현 부재
  "吗": ""            # 의문조사, 한국어 표현 부재
  "呢": ""            # 어기조사, 한국어 표현 부재
  "啊": ""            # 감탄조사, 한국어 표현 부재
  "我": "나"          # 1인칭, 한국어 한자 사용 부재
  "你": "당신"        # 2인칭, 한국어 한자 사용 부재
  "他": "그"          # 3인칭 남성
  "她": "그녀"        # 3인칭 여성
  "们": "들"          # 복수 접미사
  "都": "모두"        # 부사
  "也": "도"          # 부사
  "还": "아직"        # 부사
  "又": "또"          # 부사
  "把": ""            # BA 구문 표지
  "被": ""            # BEI 피동 표지
  "给": "주다"        # 동사/전치사
  "让": "하게 하다"   # 사역 동사
  "认": "인"          # 단독 부재, 보통 認知 등의 일부
  "为": "위해"        # 단독 시 보통 因为/为了 분리
  "对": "맞다"        # 단독 시 "맞다" 의미
  "正": ""            # 단독 부재, 正是 등의 일부
  "些": ""            # 단독 부재, 一些 등의 일부
  "战": ""            # 단독 부재, 挑战 등의 일부

  # === 일본어 단독 히라가나 (단어 일부 또는 조사 잔재) ===
  # 주의: 단독 히라가나는 분명한 일본어 신호이므로 삭제 또는 LLM 위임.
  #       Sub-path A 에서 일단 삭제 처리, 의미가 필요하면 Sub-path B 가 보충.
