  "谈": "담"            # 간체 talk
  "话": "말"            # 간체 speech
  # === 5/17 + 5/18 실측 패턴 (우선 등록) ===
  "我认为": "저는 ~라고 생각합니다"
  "对吧": "맞죠"
  "正是": "바로 그것"
  "这正是": "이것이 바로"
  "叠加": "누적"
