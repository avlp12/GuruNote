# CJK → 한국어 후처리 사전 (Phase 3)
#
# 목적: Qwen3.6-35B-A3B-5bit 의 decoder-level collapse 로 발생하는
#       한자/일본어 잔재를 Sub-path A (사전 lookup) 에서 우선 치환.
#
# 구조:
#   chinese:        Multi-char 중국어 표현 (HSK 1~4 빈출 + AI/Tech + 실측)
#   japanese:       Multi-char 일본어 표현 (N4~N3 빈출 + 실측)
#   single_char:    단일 한자/가나 (괄호 밖 잔재일 때 명백히 한국어 부재)
#
# 매칭 우선순위:
#   1. 다어절 패턴 우선 (긴 매칭 우선)
#   2. 단어 단위 패턴
#   3. 단일 문자는 단독 잔재 시에만 적용
#
# 미등록 패턴은 Sub-path B (LLM mapping) 로 위임.
#
# 출처:
#   - HSK Standard Course 1~4급 빈출 vocabulary
#   - JLPT N4~N3 빈출 표현
#   - 5/17 검증 4회 실측 잔재 패턴
#   - 5/18 cache-off 검증 5회 실측 잔재 패턴
#   - 본인 daily 사용 도메인 (AI / 휴머노이드 / 가정의학) 추가

# ─────────────────────────────────────────────────────────────
# 중국어 — Multi-char 표현
# ─────────────────────────────────────────────────────────────
chinese:
