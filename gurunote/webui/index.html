<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>GuruNote</title>
<meta name="viewport" content="width=1280, initial-scale=1" />
<style>
/* ============================================================================
   Design tokens — Google Workspace Light theme
   Source of truth: docs/handoff/DESIGN_TOKENS.md
   TODO(Phase 1-B): split into gurunote/webui/css/tokens.css
   ============================================================================ */
:root {
  /* Surface */
  --gn-bg: #ffffff;
  --gn-sidebar: #f8f9fc;
  --gn-surface-hi: #f1f3f9;
  --gn-border: #dadce0;
  --gn-border-strong: #9aa0a6;

  /* Text */
  --gn-text: #202124;
  --gn-text-dim: #5f6368;
  --gn-text-muted: #80868b;

  /* Primary (Google Blue) */
  --gn-primary: #1a73e8;
  --gn-primary-ho: #1967d2;
  --gn-primary-soft: #e8f0fe;
  --gn-on-primary: #ffffff;

  /* Status */
  --gn-success: #188038;
  --gn-success-soft: #e6f4ea;
  --gn-warning: #b06000;
  --gn-warning-soft: #feefc3;
  --gn-error: #c5221f;
  --gn-error-soft: #fce8e6;

  /* Radius */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-pill: 24px;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;

  /* Fonts */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
  --font-mono: Menlo, Monaco, "SF Mono", Consolas, monospace;

  /* Sidebar */
  --sidebar-w: 240px;
  --topbar-h: 56px;
}

/* ============================================================================
   Reset + base
   ============================================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--gn-text);
  background: var(--gn-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font: inherit; cursor: pointer; }
input { font: inherit; }
::placeholder { color: var(--gn-text-muted); }

/* ============================================================================
   App shell
   ============================================================================ */
.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ────────────────────────────────────────────────────────────── */
.sidebar {
  background: var(--gn-sidebar);
  border-right: 1px solid var(--gn-border);
  padding: var(--sp-5) var(--sp-3);
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  overflow-y: auto;
}
.brand {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  margin-bottom: var(--sp-3);
}
.brand-logo {
  width: 32px; height: 32px;
  border-radius: var(--r-md);
  background: var(--gn-primary);
  color: var(--gn-on-primary);
  display: grid; place-items: center;
  font-weight: 700; font-size: 16px;
}
.brand-name { font-weight: 700; font-size: 14px; }
.brand-ver { font-size: 11px; color: var(--gn-text-dim); }

.nav-item {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-3);
  border-radius: var(--r-md);
  color: var(--gn-text-dim);
  font-weight: 500;
  user-select: none;
  cursor: pointer;
  transition: background-color 80ms ease;
}
.nav-item:hover { background: var(--gn-surface-hi); }
.nav-item.active {
  background: var(--gn-primary-soft);
  color: var(--gn-primary);
  font-weight: 600;
}
.nav-icon { width: 18px; opacity: .85; }
.nav-label-group {
  font-size: 11px;
  color: var(--gn-text-muted);
  padding: var(--sp-3) var(--sp-3) var(--sp-1);
  text-transform: uppercase;
  letter-spacing: .04em;
}

/* ── Main area ──────────────────────────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  height: var(--topbar-h);
  border-bottom: 1px solid var(--gn-border);
  display: flex;
  align-items: center;
  padding: 0 var(--sp-5);
  gap: var(--sp-4);
  background: var(--gn-bg);
}
.crumbs {
  font-size: 11px;
  color: var(--gn-text-dim);
}
.screen-title {
  font-size: 16px;
  font-weight: 700;
}
.content {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-5);
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
}

/* ============================================================================
   Hero / Input card (생성 화면)
   ============================================================================ */
.card {
  background: var(--gn-bg);
  border: 1px solid var(--gn-border);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
}
.card-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--sp-3);
}
.card-title {
  font-size: 22px;
  font-weight: 700;
}
.card-sub {
  font-size: 13px;
  color: var(--gn-text-dim);
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: 4px 12px;
  border-radius: var(--r-pill);
  background: var(--gn-primary-soft);
  color: var(--gn-primary);
  font-size: 11px;
  font-weight: 700;
}

.input-row {
  display: flex;
  gap: var(--sp-3);
  align-items: stretch;
}
.url-input {
  flex: 1;
  height: 48px;
  padding: 0 var(--sp-5);
  border: 1px solid var(--gn-border);
  border-radius: var(--r-pill);
  background: var(--gn-bg);
  color: var(--gn-text);
  font-size: 14px;
  outline: none;
  transition: border-color 80ms ease;
}
.url-input:focus { border-color: var(--gn-primary); }

.btn {
  height: 48px;
  padding: 0 var(--sp-5);
  border-radius: var(--r-pill);
  border: 1px solid transparent;
  font-size: 14px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  transition: background-color 80ms ease, border-color 80ms ease;
}
.btn-primary {
  background: var(--gn-primary);
  color: var(--gn-on-primary);
  min-width: 200px;
}
.btn-primary:hover { background: var(--gn-primary-ho); }
.btn-ghost {
  background: transparent;
  color: var(--gn-text);
  border-color: var(--gn-border);
}
.btn-ghost:hover { background: var(--gn-surface-hi); }
.btn-sm { height: 32px; padding: 0 var(--sp-4); font-size: 13px; }

/* Drop zone overlay (HTML5 native DnD) */
.url-input.drag-over {
  border-color: var(--gn-primary);
  background: var(--gn-primary-soft);
}

/* ============================================================================
   Segmented (STT / LLM)
   ============================================================================ */
.options-row {
  display: flex;
  gap: var(--sp-6);
  flex-wrap: wrap;
}
.opt-group { display: flex; flex-direction: column; gap: var(--sp-2); }
.opt-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--gn-text-dim);
}
.segmented {
  display: inline-flex;
  background: var(--gn-sidebar);
  border: 1px solid var(--gn-border);
  border-radius: var(--r-pill);
  padding: 2px;
}
.seg-opt {
  height: 28px;
  padding: 0 var(--sp-3);
  border-radius: var(--r-pill);
  border: none;
  background: transparent;
  color: var(--gn-text-dim);
  font-size: 12px;
  font-weight: 600;
  transition: background-color 80ms, color 80ms;
}
.seg-opt:hover { color: var(--gn-text); }
.seg-opt.active {
  background: var(--gn-primary);
  color: var(--gn-on-primary);
}

/* ============================================================================
   Step indicator (5 nodes)
   ============================================================================ */
.steps {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  align-items: center;
  gap: 0;
  padding: var(--sp-3) 0;
}
.steps .node {
  width: 32px; height: 32px;
  border-radius: 16px;
  background: var(--gn-surface-hi);
  color: var(--gn-text-dim);
  display: grid; place-items: center;
  font-weight: 700; font-size: 12px;
  justify-self: center;
}
.steps .node.active,
.steps .node.done {
  background: var(--gn-primary);
  color: var(--gn-on-primary);
}
.steps .connector {
  height: 2px;
  background: var(--gn-border);
}
.steps .connector.done { background: var(--gn-primary); }
.steps .label {
  text-align: center;
  font-size: 11px;
  color: var(--gn-text-dim);
  padding-top: var(--sp-2);
}
.steps .label.active { color: var(--gn-primary); font-weight: 600; }

/* ============================================================================
   Result placeholder + log
   ============================================================================ */
.result-empty {
  border: 1px dashed var(--gn-border);
  border-radius: var(--r-md);
  padding: var(--sp-6);
  text-align: center;
  color: var(--gn-text-muted);
  font-size: 13px;
}
.log-pane {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--gn-text-dim);
  background: var(--gn-surface-hi);
  border-radius: var(--r-md);
  padding: var(--sp-3);
  max-height: 160px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

/* ============================================================================
   Progress bar (under step indicator)
   ============================================================================ */
.progress-bar {
  height: 4px;
  background: var(--gn-surface-hi);
  border-radius: 2px;
  overflow: hidden;
  margin-top: var(--sp-3);
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--gn-primary);
  transition: width 120ms ease-out;
}

/* ============================================================================
   Result — rendered markdown container
   ============================================================================ */
.result-rendered {
  font-size: 14px;
  line-height: 1.65;
  color: var(--gn-text);
}
.result-rendered h1,
.result-rendered h2,
.result-rendered h3 {
  margin: 1.2em 0 0.5em;
  line-height: 1.3;
}
.result-rendered h1 { font-size: 22px; font-weight: 700; }
.result-rendered h2 { font-size: 18px; font-weight: 700; }
.result-rendered h3 { font-size: 15px; font-weight: 700; }
.result-rendered p { margin: 0.6em 0; }
.result-rendered ul,
.result-rendered ol { padding-left: 1.4em; margin: 0.6em 0; }
.result-rendered li { margin: 0.2em 0; }
.result-rendered code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--gn-surface-hi);
  padding: 1px 6px;
  border-radius: 4px;
}
.result-rendered pre {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--gn-surface-hi);
  padding: var(--sp-3);
  border-radius: var(--r-sm);
  overflow-x: auto;
}
.result-rendered pre code {
  background: transparent;
  padding: 0;
}
.result-rendered blockquote {
  border-left: 3px solid var(--gn-border);
  padding-left: var(--sp-3);
  color: var(--gn-text-dim);
  margin: 0.6em 0;
}
.result-rendered table {
  border-collapse: collapse;
  margin: 0.6em 0;
  font-size: 13px;
}
.result-rendered th,
.result-rendered td {
  border: 1px solid var(--gn-border);
  padding: 6px 10px;
}
.result-rendered th {
  background: var(--gn-surface-hi);
  font-weight: 700;
}
.result-video-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--gn-text);
  margin-bottom: var(--sp-3);
}

/* ============================================================================
   Toast (top-right, auto-fade)
   ============================================================================ */
.toast-container {
  position: fixed;
  top: var(--sp-5);
  right: var(--sp-5);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  pointer-events: none;
}
.toast {
  min-width: 280px;
  max-width: 420px;
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-sm);
  border: 1px solid var(--gn-border);
  background: var(--gn-bg);
  box-shadow: 0 4px 12px rgba(32, 33, 36, 0.12);
  font-size: 13px;
  color: var(--gn-text);
  pointer-events: auto;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 160ms ease, transform 160ms ease;
}
.toast.visible {
  opacity: 1;
  transform: translateY(0);
}
.toast.toast-error {
  border-color: var(--gn-error);
  color: var(--gn-error);
  background: var(--gn-error-soft);
}
.toast.toast-success {
  border-color: var(--gn-success);
  color: var(--gn-success);
  background: var(--gn-success-soft);
}
.toast.toast-warning {
  border-color: var(--gn-warning);
  color: var(--gn-warning);
  background: var(--gn-warning-soft);
}
.toast .toast-title {
  font-weight: 700;
  margin-bottom: 2px;
}

/* ============================================================================
   Button disabled state
   ============================================================================ */
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ============================================================================
   Utility
   ============================================================================ */
.hidden { display: none !important; }
.muted { color: var(--gn-text-dim); }
</style>
</head>

<!-- ============================================================================
     JS — 이벤트 버스 + Bridge 호출 + UI 보일러플레이트
     TODO(Phase 1-B): 분리 → js/bus.js, js/api.js, js/screens/main.js
     ============================================================================ -->
<script>
"use strict";

/* ========================================================================
   Event Bus (window.bus)
   백엔드(Python)가 evaluate_js("window.__emit('progress', {...})") 로 푸시
   ======================================================================== */
window.bus = new EventTarget();
window.__emit = function (eventName, payload) {
  try {
    window.bus.dispatchEvent(new CustomEvent(eventName, { detail: payload }));
  } catch (e) {
    console.error("[bus] dispatch failed:", eventName, e);
  }
};

/* ========================================================================
   Bridge wrapper — pywebview.api 가 준비될 때까지 await
   pywebview 로드 시 window.pywebviewready 이벤트 발생
   ======================================================================== */
const apiReady = new Promise((resolve) => {
  if (window.pywebview && window.pywebview.api) return resolve(window.pywebview.api);
  window.addEventListener("pywebviewready", () => resolve(window.pywebview.api));
});

async function callApi(method, ...args) {
  const api = await apiReady;
  if (typeof api[method] !== "function") {
    throw new Error(`Bridge method not found: ${method}`);
  }
  return api[method](...args);
}

/* ========================================================================
   초기 로드: 앱 정보 (버전 등)
   ======================================================================== */
(async function initAppInfo() {
  try {
    const info = await callApi("get_app_info");
    if (info && info.version) {
      document.getElementById("app-version").textContent = `v${info.version}`;
    }
  } catch (e) {
    console.warn("[init] get_app_info failed (Bridge stub?):", e);
    document.getElementById("app-version").textContent = "v0.7.2.1";
  }
})();

/* ========================================================================
   Segmented control 동작
   ======================================================================== */
const segState = { stt: "auto", llm: "openai" };
document.querySelectorAll(".segmented").forEach((seg) => {
  const key = seg.dataset.seg;
  seg.addEventListener("click", (e) => {
    const btn = e.target.closest(".seg-opt");
    if (!btn) return;
    seg.querySelectorAll(".seg-opt").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    segState[key] = btn.dataset.value;
  });
});

/* ========================================================================
   파일 선택 버튼 → Bridge.pick_file()
   ======================================================================== */
document.getElementById("pick-file-btn").addEventListener("click", async () => {
  try {
    const result = await callApi("pick_file");
    if (result && result.path) {
      document.getElementById("url-input").value = `[File] ${result.path}`;
    }
  } catch (e) {
    console.error("[pick_file] error:", e);
    alert(`파일 선택 오류: ${e.message || e}`);
  }
});

/* ========================================================================
   드래그앤드롭 (HTML5 native — pywebviewFullPath 사용)
   주의: Vue Sortable / draggable 류 라이브러리 사용 금지 (issue #311)
   ======================================================================== */
const urlInput = document.getElementById("url-input");
["dragenter", "dragover"].forEach((ev) => {
  urlInput.addEventListener(ev, (e) => {
    e.preventDefault();
    e.stopPropagation();
    urlInput.classList.add("drag-over");
  });
});
["dragleave", "drop"].forEach((ev) => {
  urlInput.addEventListener(ev, (e) => {
    e.preventDefault();
    e.stopPropagation();
    urlInput.classList.remove("drag-over");
  });
});
urlInput.addEventListener("drop", (e) => {
  const files = e.dataTransfer && e.dataTransfer.files;
  if (files && files.length > 0) {
    const f = files[0];
    // pywebview 가 주입하는 절대 경로
    const fullPath = f.pywebviewFullPath || f.name;
    urlInput.value = `[File] ${fullPath}`;
  }
});

/* ========================================================================
   UI state + helpers
   ======================================================================== */
let currentJobId = null;

function setUIRunning(running) {
  document.getElementById("run-btn").disabled = running;
  document.getElementById("pick-file-btn").disabled = running;
  document.getElementById("url-input").disabled = running;
  document.querySelectorAll(".seg-opt").forEach((b) => { b.disabled = running; });
  document.getElementById("stop-btn").classList.toggle("hidden", !running);
  document.getElementById("pipeline-status").textContent = running ? "처리 중…" : "대기";
}

function resetProgressUI() {
  for (let i = 0; i < 5; i++) {
    const node = document.querySelector(`.node[data-step="${i}"]`);
    const label = document.querySelector(`.label[data-label="${i}"]`);
    if (node) node.classList.remove("active", "done");
    if (label) label.classList.remove("active");
  }
  document.querySelectorAll(".connector").forEach((c) => c.classList.remove("done"));
  document.getElementById("progress-fill").style.width = "0%";
  const pane = document.getElementById("log-pane");
  pane.textContent = "";
  pane.classList.add("hidden");
}

function updateStepIndicator(pct) {
  // Thresholds mirror gui.py:3847 `th = [0.18, 0.55, 0.78, 0.90, 1.0]`.
  const thresholds = [0.18, 0.55, 0.78, 0.90, 1.0];
  for (let i = 0; i < 5; i++) {
    const node = document.querySelector(`.node[data-step="${i}"]`);
    const label = document.querySelector(`.label[data-label="${i}"]`);
    if (!node || !label) continue;
    node.classList.remove("active", "done");
    label.classList.remove("active");
    if (pct >= thresholds[i]) {
      node.classList.add("done");
    } else if (i === 0 && pct > 0) {
      node.classList.add("active");
      label.classList.add("active");
    } else if (i > 0 && pct >= thresholds[i - 1]) {
      node.classList.add("active");
      label.classList.add("active");
    }
  }
  document.querySelectorAll(".connector").forEach((c, idx) => {
    c.classList.toggle("done", pct >= thresholds[idx]);
  });
  document.getElementById("progress-fill").style.width =
    `${Math.max(0, Math.min(100, pct * 100))}%`;
}

function appendLogLine(line) {
  const pane = document.getElementById("log-pane");
  pane.classList.remove("hidden");
  pane.textContent += line + "\n";
  pane.scrollTop = pane.scrollHeight;
}

function toast(message, kind) {
  // kind: "error" | "success" | "warning" | undefined (neutral)
  const container = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = "toast" + (kind ? ` toast-${kind}` : "");
  t.textContent = message;
  container.appendChild(t);
  requestAnimationFrame(() => t.classList.add("visible"));
  setTimeout(() => {
    t.classList.remove("visible");
    setTimeout(() => t.remove(), 200);
  }, 4000);
}

function renderResult(payload) {
  const body = document.getElementById("result-body");
  body.innerHTML = "";
  if (payload.video_title) {
    const title = document.createElement("div");
    title.className = "result-video-title";
    title.textContent = payload.video_title;
    body.appendChild(title);
  }
  const rendered = document.createElement("div");
  rendered.className = "result-rendered";
  // full_html is pre-rendered server-side via python `markdown` package.
  rendered.innerHTML = payload.full_html || "";
  body.appendChild(rendered);
}

function humanizeError(err) {
  const msg = (err && err.message) || String(err);
  // Structured codes raised by bridge.py: CODE:detail
  const m = msg.match(/^([A-Z_]+):(.*)$/);
  if (!m) return msg;
  const [, code, detail] = m;
  switch (code) {
    case "INVALID_URL":         return "유튜브 URL 형식이 아닙니다.";
    case "INVALID_LOCAL_FILE":  return `지원되지 않는 파일입니다: ${detail}`;
    case "API_KEY_MISSING":     return `API 키가 설정되지 않았습니다: ${detail}. 설정 화면에서 입력하세요.`;
    case "NO_ACTIVE_SESSION":   return "실행 중인 작업이 없습니다.";
    default:                    return msg;
  }
}

/* ========================================================================
   '생성하기' 버튼 — 파이프라인 시작
   ======================================================================== */
document.getElementById("run-btn").addEventListener("click", async () => {
  const raw = urlInput.value.trim();
  if (!raw) {
    toast("유튜브 URL 또는 로컬 파일을 먼저 선택해주세요.", "warning");
    return;
  }
  const isLocal = raw.startsWith("[File] ");
  const source = {
    kind: isLocal ? "local" : "youtube",
    value: isLocal ? raw.slice("[File] ".length) : raw,
    engine: segState.stt,
    provider: segState.llm,
  };

  resetProgressUI();
  setUIRunning(true);

  try {
    const result = await callApi("start_pipeline", source);
    currentJobId = result.job_id;
    console.info("[pipeline] started:", currentJobId);
  } catch (e) {
    console.error("[start_pipeline] error:", e);
    toast(humanizeError(e), "error");
    setUIRunning(false);
    currentJobId = null;
  }
});

/* ========================================================================
   '중지' 버튼 — 실행 중 작업에 stop_event set
   ======================================================================== */
document.getElementById("stop-btn").addEventListener("click", async () => {
  if (!currentJobId) return;
  try {
    await callApi("stop_pipeline", currentJobId);
    toast("중지 요청을 보냈습니다.");
  } catch (e) {
    console.error("[stop_pipeline] error:", e);
    toast(humanizeError(e), "error");
  }
});

/* ========================================================================
   Event bus 구독 — 백엔드 push 진행률 / 로그 / 결과
   ======================================================================== */
window.bus.addEventListener("progress", (e) => {
  const pct = e.detail && e.detail.pct;
  if (typeof pct === "number") updateStepIndicator(pct);
});

window.bus.addEventListener("log", (e) => {
  const line = e.detail && e.detail.line;
  if (line) appendLogLine(line);
});

window.bus.addEventListener("log_batch", (e) => {
  const lines = e.detail && e.detail.lines;
  if (Array.isArray(lines)) {
    for (const line of lines) appendLogLine(line);
  }
});

window.bus.addEventListener("stage_change", (e) => {
  console.log("[stage_change]", e.detail);
});

window.bus.addEventListener("result", (e) => {
  const payload = e.detail || {};
  setUIRunning(false);
  currentJobId = null;
  if (!payload.ok) {
    toast(`파이프라인 실패: ${payload.error || "알 수 없는 오류"}`, "error");
    return;
  }
  updateStepIndicator(1.0);
  renderResult(payload);
  toast("생성 완료", "success");
});

console.info("[GuruNote WebView] Phase 1-B loaded. Pipeline wiring active.");
</script>
