<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuruNote</title>

  <!-- Material 3 styles -->
  <link rel="stylesheet" href="styles/material3.css">

  <!-- React + ReactDOM (vendor, offline-capable) -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX runtime compilation -->
  <script src="vendor/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Bridge ready handler -->
  <script>
    let bridgeReady = false;
    function whenBridgeReady(callback) {
      if (bridgeReady) {
        callback();
      } else {
        window.addEventListener('pywebviewready', () => {
          bridgeReady = true;
          callback();
        });
      }
    }
  </script>

  <!-- Components (Babel-compiled in order: primitives → screens → app) -->
  <script type="text/babel" src="components/primitives.jsx"></script>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/MainScreen.jsx"></script>

  <!-- Main App -->
  <script type="text/babel">
    const { useState, useRef } = React;

    const ROUTES = {
      main:      { title: '생성' },
      running:   { title: '처리 중' },
      history:   { title: '히스토리' },
      editor:    { title: '노트 편집' },
      dashboard: { title: '대시보드' },
      settings:  { title: '설정' },
    };

    function PlaceholderScreen({ title, note }) {
      return (
        <main className="gn-main">
          <div className="gn-content" style={{ padding: 60 }}>
            <h2 style={{ marginTop: 0 }}>{title}</h2>
            <p style={{ color: 'var(--gn-on-surface-muted)' }}>{note}</p>
          </div>
        </main>
      );
    }

    function App() {
      const [route, setRoute] = useState('main');
      const meta = ROUTES[route];

      // Manual window drag — -webkit-app-region is unsupported by WKWebView
      // (pywebview macOS backend), so we mousedown on the titlebar and forward
      // screen-coordinate deltas to bridge.window_move via requestAnimationFrame.
      const dragRef = useRef({
        active: false, lastX: 0, lastY: 0,
        accDx: 0, accDy: 0, scheduled: false,
      });

      const onTitlebarMouseDown = (e) => {
        // Skip drag if the click originated from a no-drag region (traffic lights, buttons).
        if (e.target.closest && e.target.closest('[data-no-drag]')) return;
        if (e.button !== 0) return;
        e.preventDefault();
        dragRef.current.active = true;
        dragRef.current.lastX = e.screenX;
        dragRef.current.lastY = e.screenY;

        const onMove = (ev) => {
          if (!dragRef.current.active) return;
          const dx = ev.screenX - dragRef.current.lastX;
          const dy = ev.screenY - dragRef.current.lastY;
          dragRef.current.lastX = ev.screenX;
          dragRef.current.lastY = ev.screenY;
          dragRef.current.accDx += dx;
          dragRef.current.accDy += dy;

          if (dragRef.current.scheduled) return;
          dragRef.current.scheduled = true;
          requestAnimationFrame(() => {
            const ax = dragRef.current.accDx;
            const ay = dragRef.current.accDy;
            dragRef.current.accDx = 0;
            dragRef.current.accDy = 0;
            dragRef.current.scheduled = false;
            if ((ax !== 0 || ay !== 0) && window.pywebview?.api?.window_move) {
              window.pywebview.api.window_move(ax, ay);
            }
          });
        };

        const onUp = () => {
          dragRef.current.active = false;
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };

        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      return (
        <div className="gn-window" data-screen-label="GuruNote">
          {/* Titlebar — macOS traffic lights + centered title (frameless mode) */}
          <div className="gn-titlebar" onMouseDown={onTitlebarMouseDown}>
            <div className="gn-traffic" data-no-drag>
              <span
                role="button"
                tabIndex={0}
                aria-label="닫기"
                className="dot red"
                onClick={() => window.pywebview?.api?.window_close()}
              ></span>
              <span
                tabIndex={-1}
                aria-label="최소화 (사용 불가)"
                aria-disabled="true"
                className="dot yellow disabled"
              ></span>
              <span
                role="button"
                tabIndex={0}
                aria-label="전체화면 토글"
                className="dot green"
                onClick={() => window.pywebview?.api?.window_toggle_fullscreen()}
              ></span>
            </div>
            <div className="title">GuruNote — {meta.title}</div>
            <div style={{ width: 54 }} />
          </div>

          <div className="gn-body">
            <Sidebar
              activeRoute={route}
              onNavigate={setRoute}
              version="v0.8.0.6"
            />
            {route === 'main' && (
              <MainScreen onStart={() => setRoute('running')} />
            )}
            {route === 'running' && (
              <PlaceholderScreen
                title="처리 중..."
                note="Running 화면은 Commit 3 에서 구현 예정."
              />
            )}
            {route === 'history' && (
              <PlaceholderScreen title="히스토리" note="Commit 3 에서 구현 예정." />
            )}
            {route === 'editor' && (
              <PlaceholderScreen title="노트 편집" note="Commit 3 에서 구현 예정." />
            )}
            {route === 'dashboard' && (
              <PlaceholderScreen title="대시보드" note="Commit 3 에서 구현 예정." />
            )}
            {route === 'settings' && (
              <PlaceholderScreen title="설정" note="Commit 3 에서 구현 예정." />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
